<style>
body {

#topbar {

#totalSum {

#refreshBtn {

}

#dot {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: gray;
}

/* ===================================
   BURNING EFFECT
=================================== */

.counter {
  position: relative;
  overflow: hidden;
}

.counter.burning::before {
  content: "";
  position: absolute;
  inset: 3px;
  border-radius: inherit;

  /* 🔥 stärkerer Kontrast-Rahmen */
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,1),
    inset 0 0 10px rgba(255,255,255,0.9),
    inset 0 0 25px rgba(255,140,0,0.9),
    inset 0 0 50px rgba(255,60,0,0.8),
    inset 0 0 80px rgba(255,0,0,0.7);

  /* 🔲 dunkler Kontrast-Halo (wichtig für GELB!) */
  outline: 2px solid rgba(0,0,0,0.35);

  background: radial-gradient(
    circle at center,
    rgba(255,255,255,0.25),
    rgba(255,140,0,0.18),
    transparent 70%
  );

  animation: innerBorderBlink 0.15s infinite alternate;
  pointer-events: none;
  z-index: 1;
}

/* 🔥 zusätzlicher Außen-Kontrast für helle Felder */
.counter.burning {
  box-shadow:
    inset 0 0 25px rgba(255,255,255,0.4),
    inset 0 0 60px rgba(255,140,0,0.6),
    inset 0 0 100px rgba(255,0,0,0.4),

    /* wichtig: dunkler Outline-Glow */
    0 0 0 2px rgba(0,0,0,0.35),
    0 0 10px rgba(0,0,0,0.4);
}
/* 🔥 EXTREMER INNERER FLAMMENRAHMEN */
.counter.burning {
  position: relative;
  overflow: hidden;

  animation: burnFlicker 0.25s infinite alternate;
}

/* 🔥 INNERER BLINKENDER RAHMEN */
.counter.burning::before {
  content: "";
  position: absolute;
  inset: 3px; /* innen im Feld */
  border-radius: inherit;

  /* 🌈 blinkender Feuer-Rahmen */
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,0.8),
    inset 0 0 10px rgba(255,200,0,0.8),
    inset 0 0 25px rgba(255,80,0,0.7),
    inset 0 0 45px rgba(255,0,0,0.5);

  background: radial-gradient(
    circle at 50% 50%,
    rgba(255,255,255,0.15),
    rgba(255,120,0,0.15),
    transparent 70%
  );

  animation: innerBorderBlink 0.18s infinite alternate;
  pointer-events: none;
  z-index: 1;
}

/* Inhalt bleibt darüber */
.counter > * {
  position: relative;
  z-index: 2;
}

/* ⚡ schneller Blink-Glow (innen!) */
@keyframes innerBorderBlink {
  0% {
    opacity: 0.4;
    filter: brightness(1);
    box-shadow:
      inset 0 0 0 2px rgba(255,255,255,0.6),
      inset 0 0 10px rgba(255,150,0,0.5),
      inset 0 0 20px rgba(255,50,0,0.4);
  }

  100% {
    opacity: 1;
    filter: brightness(1.8);
    box-shadow:
      inset 0 0 0 2px rgba(255,255,255,1),
      inset 0 0 20px rgba(255,220,0,0.9),
      inset 0 0 40px rgba(255,80,0,0.8),
      inset 0 0 70px rgba(255,0,0,0.6);
  }
}

/* 🔥 leichtes Flackern der ganzen Kachel */
@keyframes burnFlicker {
  0% { filter: brightness(1); }
  100% { filter: brightness(1.25); }
}

/* 🔥 Pulsieren OHNE Größenänderung */
@keyframes innerPulse {

  0% {
    filter: brightness(1);
  }

  100% {
    filter: brightness(1.35);
  }
}

#grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
}

.counter {

        warningPulse 1.2s ease-in-out infinite,
        warningBlink 1s infinite;
    text-shadow:
        0 0 10px yellow,
        0 0 20px orange,
        0 0 30px red;
}

@keyframes warningPulse {
    0%,100% {
        transform: scale(1);
    }
    50% {
        transform: scale(1.35);
    }
}

@keyframes warningBlink {
    0%,100% {
        filter: brightness(1);
    }
    50% {
        filter: brightness(2);
    }
}

/* 🔥 einzelne Flammen */
.flame {
  font-size: 30px;
  opacity: 0.3;
  cursor: pointer;
  transition: 0.2s;
}

/* aktive Flamme */
.flame.active {
  opacity: 1;
  animation: flameFlicker 0.4s infinite alternate;
}

/* ✨ wenn mindestens eine aktiv → Box glow */
.flames.active-box {
  box-shadow: 0 0 15px rgba(255, 119, 0, 0.81);
}

/* 🔥 Animation */
@keyframes flameFlicker {
  0% {
    transform: scale(1) rotate(-2deg);
    text-shadow: 
      0 0 5px #ff9800,
      0 0 10px #ff5722,
      0 0 20px #ff0000;
  }
  50% {
    transform: scale(1.1) rotate(2deg);
    text-shadow: 
      0 0 10px #ffc107,
      0 0 20px #ff9800,
      0 0 30px #ff5722;
  }
  100% {
    transform: scale(0.95) rotate(-1deg);
    text-shadow: 
      0 0 8px #ff9800,
      0 0 15px #ff5722,
      0 0 25px #ff0000;
  }
  
}

.flame.plus {

      0 0 20px #48ff00,
      0 0 35px #00ff0d,
      0 0 55px #6cf72b;
  animation: plusPulse 10000s infinite alternate;
}
</style>

  const sec = Math.floor(ms / 1000);

  const hour = Math.floor(min / 60);

  if (min < 60) return `sync: vor ${min}min`;
  return `sync: vor ${hour}h`;
}

    </span>
  `;

  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}
// -------------------------
// SEND
// -------------------------
window.sendMessage = async () => {
  const input = document.getElementById("msgInput");
  const text = input.value.trim();

  if (!text) return;

  await supabase.from("chatmessages").insert({
    text,
    color: userColor
  });

  input.value = "";
};

// ENTER
document.getElementById("msgInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") sendMessage();
});

// -------------------------
// LOAD
// -------------------------
let lastMessageTime = null;

async function loadMessages() {
  const { data } = await supabase
    .from("chatmessages")
    .select("*")
    .order("created_at", { ascending: true });

  const box = document.getElementById("messages");
  box.innerHTML = "";

  data.forEach(addMessageToUI);

  if (data.length > 0) {
    lastMessageTime = data[data.length - 1].created_at;
  }
}

// -------------------------
// POLL (LIVE WITHOUT REPLICATION)
// -------------------------
async function pollMessages() {
  if (!lastMessageTime) {
    await loadMessages();
    return;
  }

  const { data } = await supabase
    .from("chatmessages")
    .select("*")
    .gt("created_at", lastMessageTime)
    .order("created_at", { ascending: true });

  if (data && data.length > 0) {
    data.forEach(addMessageToUI);
    lastMessageTime = data[data.length - 1].created_at;
  }
}

// START
loadMessages();
setInterval(pollMessages, 1500);

</script>

</html>
